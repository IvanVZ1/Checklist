<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checklist Auditoría de Redes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --text: #1a1a18;
      --muted: #6b6b65;
      --border: #e2dfd8;
      --tag-bg: #efefeb;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3rem 3.5rem;
      max-width: 580px;
      width: 100%;
    }

    .tag {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--tag-bg);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 2px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      font-weight: 400;
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 2rem;
    }

    /* Secciones pill list */
    .sections {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 2.5rem;
    }

    .pill {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 2px;
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* Stat row */
    .stats {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .stat {
      flex: 1;
      padding: 14px 16px;
      border-right: 1px solid var(--border);
      text-align: center;
    }

    .stat:last-child { border-right: none; }

    .stat .num {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: var(--text);
    }

    .stat .lbl {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Botón descarga */
    .download-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: 4px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }

    .download-item:hover {
      border-color: #aaa;
      background: #fafaf8;
    }

    .download-item:active { transform: scale(0.99); }

    .item-icon {
      width: 42px;
      height: 42px;
      border-radius: 3px;
      background: #eef4ff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .item-info { flex: 1; }
    .item-info .name { font-size: 13px; font-weight: 500; }
    .item-info .meta { font-size: 11px; color: var(--muted); margin-top: 3px; }

    .item-badge {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
      background: #eef4ff;
      color: #2b5fbd;
      flex-shrink: 0;
    }

    .item-arrow { color: var(--muted); flex-shrink: 0; }

    .footer {
      margin-top: 2.5rem;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="tag">Auditoría de Redes</span>
    <h1>Checklist Auditoría de Redes</h1>
  


    <p class="section-label">Descargar</p>
    <a class="download-item" href="Checklist_Auditoria_Redes.docx" download="Checklist_Auditoria_Redes.docx">
      <div class="item-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2b5fbd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="9" y1="13" x2="15" y2="13"/>
          <line x1="9" y1="17" x2="15" y2="17"/>
          <line x1="9" y1="9" x2="11" y2="9"/>
        </svg>
      </div>
      <div class="item-info">
        <div class="name">Checklist Auditoría de Redes</div>
        <div class="meta">Checklist_Auditoria_Redes.docx</div>
      </div>
      <span class="item-badge">DOCX</span>
      <svg class="item-arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </a>

  </div>
</body>
</html>
